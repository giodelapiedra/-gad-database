server {
    server_name gadapi.tanauancity.com;

    location / {
        root /var/www/gad/client/dist;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gadapi.tanauancity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gadapi.tanauancity.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = gadapi.tanauancity.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name gadapi.tanauancity.com;
    return 404;
}
